<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>おみくじ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #f5f0e8;
      font-family: 'Noto Serif JP', serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 2rem 1rem 4rem;
    }

    .stage {
      text-align: center;
      width: 100%;
      max-width: 400px;
    }

    /* ===== 箱エリア ===== */
    .scene {
      position: relative;
      width: 160px;
      height: 260px;
      margin: 0 auto 1.5rem;
    }

    /* ===== ボタン ===== */
    .draw-btn {
      font-family: 'Noto Serif JP', serif;
      font-size: 14px;
      letter-spacing: 0.12em;
      padding: 10px 32px;
      border: 1px solid #b09060;
      border-radius: 6px;
      background: #fff;
      color: #3a2e1c;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .draw-btn:hover { background: #f5ead8; }
    .draw-btn:active { transform: scale(0.97); }
    .draw-btn:disabled { opacity: 0.35; cursor: default; }

    .again-btn {
      display: none;
      font-family: 'Noto Serif JP', serif;
      font-size: 12px;
      letter-spacing: 0.1em;
      padding: 8px 24px;
      border: 1px solid #c8b890;
      border-radius: 6px;
      background: transparent;
      color: #7a6642;
      cursor: pointer;
      margin-top: 12px;
      transition: background 0.15s;
    }
    .again-btn:hover { background: #f5ead8; }

    /* ===== おみくじの紙 ===== */
    .paper-wrap {
      margin-top: 1.5rem;
      display: flex;
      justify-content: center;
    }

    .paper {
      width: 160px;
      background: #f9f4e8;
      border: 1.5px solid #c8a96e;
      border-radius: 3px;
      text-align: center;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.5s, transform 0.5s;
      overflow: hidden;
    }
    .paper.show {
      opacity: 1;
      transform: translateY(0);
    }

    .paper-header {
      background: #c0392b;
      padding: 6px 8px 5px;
      border-bottom: 2px solid #922b21;
    }
    .paper-header-title {
      font-size: 11px;
      letter-spacing: 0.35em;
      color: #fff;
      font-weight: 700;
    }

    .paper-body { padding: 14px 12px; }
    .paper-rank { font-size: 32px; font-weight: 700; letter-spacing: 0.15em; margin-bottom: 2px; }
    .paper-reading { font-size: 10px; letter-spacing: 0.2em; color: #7a6642; margin-bottom: 8px; }
    .paper-divider { width: 50px; height: 0.5px; background: #c8a96e; margin: 0 auto 10px; }

    .pd {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 4px 0;
      border-bottom: 0.5px solid #e8d9b8;
    }
    .pd:last-child { border-bottom: none; }
    .pd-label { font-size: 10px; color: #7a6642; flex-shrink: 0; margin-right: 6px; }
    .pd-val { font-size: 11px; color: #3a2e1c; text-align: right; line-height: 1.4; }
  </style>
</head>
<body>
  <div class="stage">

    <div class="scene">
      <svg id="boxSvg" width="160" height="260" viewBox="0 0 160 260" xmlns="http://www.w3.org/2000/svg">

        <g id="stick" style="opacity:0; transition: transform 0.6s cubic-bezier(0.2,0.8,0.3,1), opacity 0.3s;">
          <rect x="74" y="20" width="12" height="70" rx="6" fill="#E8A84A" stroke="#C8862A" stroke-width="0.5"/>
          <ellipse cx="80" cy="86" rx="6" ry="4" fill="#C8862A"/>
          <circle cx="80" cy="20" r="5" fill="#FF6B6B"/>
        </g>

        <polygon points="35,82 55,92 55,222 35,212" fill="#B8621A"/>

        <polygon points="55,92 105,92 105,222 55,222" fill="#E8882A"/>

        <polygon points="105,92 125,82 125,212 105,222" fill="#C8701A"/>

        <polygon points="35,212 55,222 105,222 125,212 80,227" fill="#9A4E10"/>

        <polygon points="35,82 55,92 105,92 125,82 125,89 105,99 55,99 35,89" fill="#CC2200"/>
        <polygon points="35,212 55,222 105,222 125,212 125,219 105,229 55,229 35,219" fill="#AA1800"/>

        <rect x="58" y="115" width="44" height="75" rx="3" fill="#F5D060" stroke="#C8A020" stroke-width="1"/>
        <text x="80" y="135" font-family="'Noto Serif JP',serif" font-size="13" fill="#4A3000" font-weight="700" text-anchor="middle">お</text>
        <text x="80" y="153" font-family="'Noto Serif JP',serif" font-size="13" fill="#4A3000" font-weight="700" text-anchor="middle">み</text>
        <text x="80" y="171" font-family="'Noto Serif JP',serif" font-size="13" fill="#4A3000" font-weight="700" text-anchor="middle">く</text>
        <text x="80" y="189" font-family="'Noto Serif JP',serif" font-size="13" fill="#4A3000" font-weight="700" text-anchor="middle">じ</text>

        <g id="lid" style="transform-origin: 80px 62px; transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);">
          <polygon points="80,52 115,62 125,82 105,92 55,92 35,82" fill="#F09030"/>
          <polygon points="80,52 105,69 115,62" fill="#F8B050" opacity="0.6"/>
          <polygon points="80,52 55,69 35,82" fill="#F8B050" opacity="0.4"/>
          <ellipse cx="80" cy="72" rx="7" ry="4" fill="#5A3000"/>
          <ellipse cx="80" cy="71" rx="5" ry="2.5" fill="#3A1800"/>
        </g>

      </svg>
    </div>

    <button class="draw-btn" id="drawBtn" onclick="draw()">おみくじを引く</button>

    <div class="paper-wrap">
      <div class="paper" id="paper"></div>
    </div>
    <button class="again-btn" id="againBtn" onclick="reset()">もう一度引く</button>

  </div>

  <script>
    // ===== 各項目のバリエーション =====
    const variants = {
      wish: {
        daikichi: ['必ず叶う', '願いは大きく実る', '天の後押しあり', '思い切って動くべし', '時を選ばず叶う'],
        kichi:    ['誠実に臨めば叶う', '努力が実を結ぶ', '信じる心が鍵', '着実に近づいている', '焦らず続ければ叶う'],
        chukichi: ['じっくり取り組むべし', '心を整えれば叶う', '周囲の助けを借りよ', '油断せず進むべし', '半歩ずつ前進せよ'],
        shokichi: ['もう少し時間が必要', '急がず丁寧に', '小さな積み重ねが大事', '今は準備の時', '芽吹きはこれから'],
        suekichi: ['焦りは禁物', '時機を見極めよ', '種を蒔く時期', '静かに待つべし', '遠回りも無駄にならぬ'],
        kyo:      ['今は慎重に', '一歩引いて考えよ', '見直しの機会と思え', '無理をしないこと', '立ち止まる勇気も大切'],
        daikyo:   ['今は動かぬが吉', '焦りが最大の敵', '時が来るまで待て', '水面下で力を蓄えよ', '諦めず嵐を待て']
      },
      health: {
        daikichi: ['心身ともに充実', '活力みなぎる', '良好この上なし', '回復力が高まる', '無敵の体調'],
        kichi:    ['おおむね良好', '体調は安定', '無理しなければ問題なし', '規則正しい生活を', 'ゆっくり休むと万全'],
        chukichi: ['食事と睡眠を整えよ', '無理は禁物', '疲れを溜めないこと', '少し休息が必要', '軽い運動が吉'],
        shokichi: ['早めの養生が肝心', '小さな不調を見逃すな', '生活習慣を見直せ', '油断は禁物', '水分をよく摂ること'],
        suekichi: ['過労に注意', '冷えに気をつけよ', '体の声に耳を傾けよ', '無理は禁物', '無理をすると長引く'],
        kyo:      ['十分な休息を取れ', '無理は大敵', '体調不良に注意', '医師への相談も手', '静養が一番の薬'],
        daikyo:   ['早急に休息を取れ', '無理は命取り', '不調を放置するな', '静かに体を守れ', '今は守りに徹せよ']
      },
      love: {
        daikichi: ['良縁近づく', '想いは必ず届く', '関係が深まる', '出会いの予感あり', '愛が実を結ぶ'],
        kichi:    ['縁あり', '誠実に接すれば吉', '素直な気持ちが大切', '好機は近い', '相手を信じると吉'],
        chukichi: ['焦らず育てよ', '丁寧に向き合うべし', '小さな気遣いを忘れずに', '共に過ごす時間を大切に', '少し距離を縮めてみよ'],
        shokichi: ['今は友人関係から', '関係は芽吹きかけ', 'ゆっくり距離を縮めよ', '無理に進めると逆効果'],
        suekichi: ['今は自分を見つめ直せ', '心の余裕が大事', '縁は遠からず近からず', '待つ姿勢が吉', '急がば回れ'],
        kyo:      ['言葉を選んで話せ', '誤解を招きやすい時', 'しばらく静観すべし', '強引に進めるのは禁物', '相手の気持ちを尊重せよ'],
        daikyo:   ['すれ違いに注意', '今は縁が薄い時期', '嵐が過ぎるのを待て', '自分を大切にすることが先', '無理に近づくと傷つく']
      },
      work: {
        daikichi: ['昇進の兆しあり', '大きな成果が出る', '才能が輝く時', '勇敢に挑戦せよ', '周囲の評価が高まる'],
        kichi:    ['努力が実る', '信頼を積み重ねよ', '地道な取り組みが吉', '着実に前進している', '良い機会が訪れる'],
        chukichi: ['丁寧な仕事が大切', '協力者を大切に', '焦らず取り組むべし', '現状をしっかり固めよ', '小さな改善が功を奏す'],
        shokichi: ['今は現状維持が吉', '基礎を固める時期', '周囲との連携を重視せよ', '新しい挑戦は少し待て', '地味でも続けることが大事'],
        suekichi: ['結果はすぐに出ない', '実力を磨く時期', '今は種を蒔く時', '焦りは禁物', '遠回りが近道になる'],
        kyo:      ['ミスに注意', '確認作業を怠るな', '一歩引いて計画を見直せ', '無謀な挑戦は避けよ', '慎重に進めること'],
        daikyo:   ['大きなリスクは避けよ', '重要な判断は先延ばしに', '今は守りを固める時', '信頼できる人に相談せよ', '嵐が去るまで耐えよ']
      }
    };

    // ===== 運勢の種類と確率 =====
    const ranks = [
      { key: 'daikichi', label: '大吉', reading: 'だいきち',  color: '#993C1D', prob: 10 },
      { key: 'kichi',    label: '吉',   reading: 'きち',      color: '#3B6D11', prob: 10 },
      { key: 'chukichi', label: '中吉', reading: 'ちゅうきち', color: '#185FA5', prob: 20 },
      { key: 'shokichi', label: '小吉', reading: 'しょうきち', color: '#854F0B', prob: 20 },
      { key: 'suekichi', label: '末吉', reading: 'すえきち',  color: '#0F6E56', prob: 20 },
      { key: 'kyo',      label: '凶',   reading: 'きょう',    color: '#5F5E5A', prob: 10 },
      { key: 'daikyo',   label: '大凶', reading: 'だいきょう', color: '#A32D2D', prob: 10 }
    ];

    // 確率に基づいてランダムに運勢を選ぶ
    function pick() {
      let r = Math.floor(Math.random() * 100), acc = 0;
      for (let rank of ranks) {
        acc += rank.prob;
        if (r < acc) return rank;
      }
      return ranks[0];
    }

    // 配列からランダムに1つ選ぶ
    function rnd(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    // ===== おみくじを引く =====
    function draw() {
      document.getElementById('drawBtn').disabled = true;
      const lid   = document.getElementById('lid');
      const stick = document.getElementById('stick');

      // 1. フタを開く
      lid.style.transform = 'rotate(-40deg) translateX(-12px) translateY(-14px)';

      // 2. 棒が飛び出す
      setTimeout(() => {
        stick.style.opacity   = '1';
        stick.style.transform = 'translateY(-60px)';
      }, 400);

      // 3. 結果の紙を表示
      setTimeout(() => {
        const f = pick();
        const k = f.key;
        const paper = document.getElementById('paper');

        paper.innerHTML =
          '<div class="paper-header"><p class="paper-header-title">御　神　籤</p></div>' +
          '<div class="paper-body">' +
          '<p class="paper-rank" style="color:' + f.color + '">' + f.label + '</p>' +
          '<p class="paper-reading">' + f.reading + '</p>' +
          '<div class="paper-divider"></div>' +
          '<div class="paper-details">' +
          '<div class="pd"><span class="pd-label">願い事</span><span class="pd-val">' + rnd(variants.wish[k])   + '</span></div>' +
          '<div class="pd"><span class="pd-label">健　康</span><span class="pd-val">' + rnd(variants.health[k]) + '</span></div>' +
          '<div class="pd"><span class="pd-label">恋　愛</span><span class="pd-val">' + rnd(variants.love[k])   + '</span></div>' +
          '<div class="pd"><span class="pd-label">仕　事</span><span class="pd-val">' + rnd(variants.work[k])   + '</span></div>' +
          '</div></div>';

        paper.classList.add('show');
        stick.style.opacity = '0';
        document.getElementById('againBtn').style.display = 'inline-block';
      }, 1100);
    }

    // ===== リセット =====
    function reset() {
      const lid   = document.getElementById('lid');
      const stick = document.getElementById('stick');
      const paper = document.getElementById('paper');

      lid.style.transform   = '';
      stick.style.transform = '';
      stick.style.opacity   = '0';
      paper.classList.remove('show');
      paper.innerHTML = '';
      document.getElementById('againBtn').style.display = 'none';

      setTimeout(() => {
        document.getElementById('drawBtn').disabled = false;
      }, 400);
    }
  </script>
</body>
</html>
