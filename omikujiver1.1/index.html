<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本格おみくじアプリ</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f0;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #c0392b;
            margin-bottom: 30px;
        }
        .box-area {
            font-size: 80px;
            margin: 20px 0;
            transition: transform 0.1s ease-in-out;
        }
        .shake {
            animation: shakeAnim 0.5s ease-in-out infinite;
        }
        @keyframes shakeAnim {
            0% { transform: translate(0, 0) rotate(0deg); }
            20% { transform: translate(-10px, 0) rotate(-5deg); }
            40% { transform: translate(10px, 0) rotate(5deg); }
            60% { transform: translate(-10px, 0) rotate(-5deg); }
            80% { transform: translate(10px, 0) rotate(5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        button {
            background-color: #c0392b;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }
        button:hover {
            background-color: #e74c3c;
            transform: translateY(-2px);
        }
        .result-area {
            display: none;
            animation: fadeIn 0.5s ease-in-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .unsei {
            font-size: 48px;
            font-weight: bold;
            color: #e74c3c;
            margin: 20px 0;
            border-bottom: 3px double #e74c3c;
            display: inline-block;
            padding: 0 20px;
        }
        .grid-table {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 25px 0;
        }
        .grid-item {
            background-color: #fff9f9;
            border: 1px solid #f5e6e6;
            padding: 12px;
            border-radius: 8px;
            text-align: left;
        }
        .grid-item h3 {
            margin: 0 0 5px 0;
            color: #c0392b;
            font-size: 16px;
            border-left: 3px solid #c0392b;
            padding-left: 8px;
        }
        .grid-item p {
            margin: 0;
            font-size: 14px;
            color: #555;
            line-height: 1.4;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>新春おみくじ</h1>

        <div id="setup-view">
            <div id="omikuji-box" class="box-area">📦</div>
            <button id="draw-btn" onclick="drawOmikuji()">おみくじを引く</button>
        </div>

        <div id="result-view" class="result-area">
            <div class="box-area">📜</div>
            <div>＜運勢＞</div>
            <div id="result-unsei" class="unsei">大吉</div>

            <div class="grid-table">
                <div class="grid-item">
                    <h3>願い事</h3>
                    <p id="res-negai"></p>
                </div>
                <div class="grid-item">
                    <h3>健康</h3>
                    <p id="res-kenko"></p>
                </div>
                <div class="grid-item">
                    <h3>恋愛</h3>
                    <p id="res-renai"></p>
                </div>
                <div class="grid-item">
                    <h3>仕事</h3>
                    <p id="res-shigoto"></p>
                </div>
            </div>

            <button onclick="resetOmikuji()">もう一度引く</button>
        </div>
    </div>

    <script>
        const unseiList = [
            { name: '大吉', weight: 10 },
            { name: '吉',   weight: 10 },
            { name: '中吉', weight: 20 },
            { name: '小吉', weight: 20 },
            { name: '末吉', weight: 20 },
            { name: '凶',   weight: 10 },
            { name: '大凶', weight: 10 }
        ];

        const details = {
            negai: [
                "一歩ずつ進めば必ず叶うでしょう",
                "周囲の助けを得て予想以上に早く成就します",
                "強い信念を持ち続けることが成功の鍵です",
                "今は焦らず、準備を整える時期です",
                "思わぬ形で願いが届く兆しがあります"
            ],
            kenko: [
                "気力が充実し、健やかに過ごせる一年です",
                "夜更かしに注意。規則正しい生活を心がけて",
                "適度な運動を取り入れると運気がさらに向上します",
                "疲れが溜まりやすい時期。休息を大切に",
                "暴飲暴食を控え、胃腸を労わりましょう"
            ],
            renai: [
                "素晴らしい出会いの予感。自分らしく進んで吉",
                "相手を思いやる心が、二人の絆を深めます",
                "じっくり時間をかけることで実を結びます",
                "言葉のすれ違いに注意。誠実な対話を",
                "焦りは禁物。まずは自分磨きに専念しましょう"
            ],
            shigoto: [
                "これまでの努力が認められ、大きな成果が出ます",
                "新しい挑戦がスキルアップに繋がる好機です",
                "チームワークを意識するとスムーズに進みます",
                "計画を細かく見直すことで、ミスを未然に防げます",
                "一歩引いて全体を見渡すと、新しいアイデアが湧きます"
            ]
        };

        function getRandomElement(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function getWeightedUnsei() {
            const totalWeight = unseiList.reduce((sum, item) => sum + item.weight, 0);
            let randomNum = Math.floor(Math.random() * totalWeight);

            for (const item of unseiList) {
                if (randomNum < item.weight) {
                    return item.name;
                }
                randomNum -= item.weight;
            }
        }

        function drawOmikuji() {
            const box = document.getElementById('omikuji-box');
            const drawBtn = document.getElementById('draw-btn');

            drawBtn.disabled = true;
            box.classList.add('shake');

            setTimeout(() => {
                box.classList.remove('shake');
                drawBtn.disabled = false;

                document.getElementById('result-unsei').innerText = getWeightedUnsei();
                document.getElementById('res-negai').innerText = getRandomElement(details.negai);
                document.getElementById('res-kenko').innerText = getRandomElement(details.kenko);
                document.getElementById('res-renai').innerText = getRandomElement(details.renai);
                document.getElementById('res-shigoto').innerText = getRandomElement(details.shigoto);

                document.getElementById('setup-view').classList.add('hidden');
                document.getElementById('result-view').style.display = 'block';
            }, 1000);
        }

        function resetOmikuji() {
            document.getElementById('setup-view').classList.remove('hidden');
            document.getElementById('result-view').style.display = 'none';
        }
    </script>
</body>
</html>
